services:
  # ──────────────────────────────────────────────
  # Microsoft SQL Server 2022
  # ──────────────────────────────────────────────
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: webapi_db
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${DB_PASSWORD:?DB_PASSWORD must be set in .env}"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q 'SELECT 1' -No || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ──────────────────────────────────────────────
  # ASP.NET Core 8 Web API
  # ──────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: WebApiP33/Dockerfile
    container_name: webapi_api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=WebApiP33;User Id=sa;Password=${DB_PASSWORD:?DB_PASSWORD must be set in .env};TrustServerCertificate=True;"
      JwtSettings__SecretKey: "${JWT_SECRET:?JWT_SECRET must be set in .env}"
      JwtSettings__ExpiryMinutes: "60"
    depends_on:
      db:
        condition: service_healthy

  # ──────────────────────────────────────────────
  # Vue 3 frontend served by nginx with HTTPS
  # ──────────────────────────────────────────────
  frontend:
    build:
      context: ./vue-front
      dockerfile: Dockerfile
    container_name: webapi_frontend
    restart: unless-stopped
    environment:
      APP_DOMAIN: "${APP_DOMAIN:?APP_DOMAIN must be set in .env}"
      APP_DOMAIN_WWW: "${APP_DOMAIN_WWW:-}"
      SSL_CERT_FULLCHAIN_PATH: "${SSL_CERT_FULLCHAIN_PATH:-/etc/nginx/ssl/fullchain.pem}"
      SSL_CERT_PRIVKEY_PATH: "${SSL_CERT_PRIVKEY_PATH:-/etc/nginx/ssl/privkey.pem}"
    ports:
      - "${FRONTEND_EXTERNAL_PORT:-80}:80"
      - "${FRONTEND_HTTPS_EXTERNAL_PORT:-443}:443"
    volumes:
      - ./vue-front/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
      - "${SSL_CERTS_DIR:-./deploy/certs}:/etc/nginx/ssl:ro"
    depends_on:
      - api

volumes:
  mssql_data:

